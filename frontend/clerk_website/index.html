<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clerk</title>

<style>
:root{
  --text:#436172;
  --muted:#7f98a5;
  --line:#e3eaee;
  --teal:#6ad0c7;
  --teal-dark:#47b9b2;
  --teal-soft:#dff4f2;
  --pink:#ef7f93;
  --yellow:#f1cd74;
  --shadow:0 10px 28px rgba(79,113,130,.12);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:radial-gradient(circle at top left,#dff5f2 0%,#eef3f5 32%,#f7f8fa 100%);
  color:var(--text)
}

.topbar{
  height:86px;
  background:rgba(255,255,255,.75);
  border-bottom:1px solid rgba(200,215,222,.7);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 34px
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  font-weight:700;
  font-size:34px
}

.brand img{
  width:54px;
  height:54px;
  border-radius:50%;
  background:white;
  object-fit:cover
}

.nav{
  display:flex;
  gap:18px;
  font-size:17px
}

.nav a{
  color:var(--text);
  text-decoration:none;
  padding:12px 18px;
  border-radius:14px
}

.nav a.active{
  background:var(--teal-soft)
}

.avatar{
  width:54px;
  height:54px;
  border-radius:50%;
  background:linear-gradient(135deg,#d8f2ef,#fff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px
}

.page{
  max-width:1240px;
  margin:auto;
  padding:28px 24px 60px
}

.layout{
  display:grid;
  grid-template-columns:280px 1fr;
  gap:26px
}

.sidebar,.panel,.composer{
  background:rgba(255,255,255,.82);
  border:1px solid rgba(221,230,235,.95);
  border-radius:26px;
  box-shadow:var(--shadow)
}

.panel.show, .composer.show {
    display: block !important;
}

.sidebar{
  padding:22px
}

.month-card{
  background:linear-gradient(180deg,#f4fbfb,#fff);
  border-radius:20px;
  padding:20px
}

.month-row{
  display:flex;
  justify-content:space-between;
  font-size:18px;
  font-weight:700;
  margin-bottom:16px
}

.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  text-align:center;
  font-size:14px;
  color:var(--muted)
}

.calendar-grid .dayname{
  font-weight:700
}

.calendar-grid div{
  padding:6px 0;
  border-radius:50px
}

.calendar-grid .selected{
  background:var(--teal);
  color:white;
  font-weight:700
}


.filters h3{
  margin:0 0 18px;
  font-size:18px
}

.main-stack{
  display:grid;
  gap:24px
}

.today-header{
  text-align:center
}

.today-header h1{
  margin:12px 0 16px;
  font-size:28px
}

.today-header .line{
  height:1px;
  background:#dce6ea
}

.panel,.composer{
  padding:26px
}

.panel h2,.composer h2{
  margin:0 0 20px;
  font-size:24px
}

.agenda-list{
  display:grid
}

.agenda-item {
    display: flex;
    align-items: flex-start;
    gap: 20px; 
    padding: 15px;
    margin-bottom: 10px;
}

.agenda-item:first-child{
  border-top:none
}

.time {
    min-width: 120px;
    font-family: monospace;
    font-size: 0.85rem;
    color: var(--muted);
    white-space: nowrap;
}

.task-main {
    flex-grow: 1; /* Lets the task fill the remaining space */
}

.task-main.teal{background:rgba(106,208,199,.18)}
.task-main.pink{background:rgba(239,127,147,.92);color:white}
.task-main.gold{background:rgba(241,205,116,.78)}

.task-title{
  font-size:20px;
  font-weight:700
}

.task-sub{
  font-size:14px;
  color:var(--muted);
  margin-top:8px
}

.meta-row{
  margin-top:8px;
  display:flex;
  gap:10px;
  flex-wrap:wrap
}

.date-label{
  font-size:13px;
  color:var(--muted)
}

.confidence-pill{
  font-size:12px;
  padding:4px 8px;
  border-radius:12px;
  background:var(--teal-soft);
  color:var(--teal-dark);
  font-weight:700
}

.pill{
  display:inline-block;
  font-size:12px;
  padding:6px 10px;
  border-radius:10px;
  background:rgba(0,0,0,.12);
  margin-top:4px
}

.subline{
  height:1px;
  background:#dce6ea;
  margin:14px 0 22px
}

label{
  display:block;
  font-size:18px;
  font-weight:700;
  margin-bottom:14px
}

textarea{
  width:100%;
  min-height:92px;
  border:1px solid #d7e2e7;
  border-radius:16px;
  padding:18px;
  font-size:18px;
  resize:vertical;
  outline:none
}

.composer-actions{
  display:flex;
  justify-content:space-between;
  margin-top:16px;
  flex-wrap:wrap;
  gap:14px
}

.left-buttons{
  display:flex;
  gap:12px;
  flex-wrap:wrap
}

button{
  border:none;
  border-radius:12px;
  padding:14px 18px;
  font-size:16px;
  font-weight:700;
  cursor:pointer
}

button:disabled{
  opacity:.7;
  cursor:not-allowed
}

.ghost{
  background:#f5fbfb;
  color:var(--teal-dark);
  border:1px solid #d8ecea
}

.primary{
  background:linear-gradient(135deg,var(--teal),var(--teal-dark));
  color:white
}

.insights-panel{
  padding:26px;
  margin-top:34px;
}

.insights-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.insights-kicker{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--teal-dark);
  font-weight:700;
}

.insights-subtitle{
  color:var(--muted);
  margin-top:6px;
  font-size:14px;
}

.insights-badge{
  background:var(--teal-soft);
  color:var(--teal-dark);
  font-weight:700;
  font-size:13px;
  padding:8px 12px;
  border-radius:999px;
}

.insights-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.insight-card{
  background:white;
  border:1px solid #e4ecef;
  border-radius:18px;
  padding:18px;
  box-shadow:0 6px 18px rgba(79,113,130,.08);
}

.insight-type{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--muted);
  font-weight:700;
  margin-bottom:10px;
}

.insight-title{
  font-size:19px;
  font-weight:700;
  margin-bottom:8px;
}

.insight-body{
  font-size:14px;
  color:var(--muted);
  line-height:1.5;
  margin-bottom:14px;
}

.insight-footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.insight-chip{
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  font-weight:700;
}

.insight-chip.warn{background:#fff0f3;color:#c4556b}
.insight-chip.info{background:#eef7ff;color:#4a87b7}
.insight-chip.success{background:#edf8f3;color:#3e8b67}

.insight-link{
  font-size:13px;
  font-weight:700;
  color:var(--teal-dark);
}

#newTasksList:empty::before{
  content:"Newly added tasks will appear here.";
  display:block;
  color:var(--muted);
  font-size:15px;
  padding:8px 0 4px;
}

@media (max-width:980px){
  .layout{grid-template-columns:1fr}
  .agenda-item{grid-template-columns:1fr;gap:10px}

.cal-nav {

    align-items: center;
    margin-bottom: 20px;
}

.big-calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: #e2e8f0; /* Grid line color */
    border: 1px solid #e2e8f0;
}

.cal-header {
    background: #f8fafc;
    padding: 10px;

    font-weight: bold;
    font-size: 0.8rem;
}

.cal-day {
    background: white;
    min-height: 100px;
    padding: 5px;

    flex-direction: column;
    gap: 4px;

.day-num {

    color: #94a3b8;
    margin-bottom: 4px;
}

.cal-task-pill {

    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    background: #dff4f2;
    color: #47b9b2;
}

.cal-task-pill.high { background: #fee2e2; color: #ef4444; }

<script>
const taskInput = document.getElementById('taskInput');
const processBtn = document.getElementById('processBtn');

const taskTitlePreview = document.getElementById('taskTitlePreview');
const taskPriorityPreview = document.getElementById('taskPriorityPreview');
const taskDuePreview = document.getElementById('taskDuePreview');
const taskConfidence = document.getElementById('taskConfidence');
const taskDescPreview = document.getElementById('taskDescPreview');

let currentTask = null; // This will hold the result from your FastAPI /ingest
let currentView = 'agenda';

//for the calendar, it keeps track where the user is currently looking at
let currentCalMonth = new Date().getMonth();
let currentCalYear = new Date().getFullYear();


document.querySelectorAll('.nav a').forEach(link => {
    link.addEventListener('click', (e) => {
        e.preventDefault();
        
        // 1. Remove 'active' class from all, add to the clicked one
        document.querySelectorAll('.nav a').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        
        // 2. Change the view
        const viewName = link.textContent.trim().toLowerCase();
        loadView(viewName);
    });
});


function renderTaskList(tasks, containerId) {
  
    const container = document.getElementById(containerId);
    if (!container) return;

    // Clear the "Loading..." or old tasks
    container.innerHTML = '';

    if (tasks.length === 0) {
        container.innerHTML = '<p style="color:var(--muted); padding:20px;">No tasks found for this view.</p>';
        return;
    }

    tasks.forEach(task => {
    const item = document.createElement('div');
    item.className = 'agenda-item';

    const taskDateStr = task.due || task.due_date;
    let formattedTime = "No Date";

    if (taskDateStr && taskDateStr !== 'None') {
        const d = new Date(taskDateStr);
        // This creates a format like "Apr 14 @ 05:30 PM"
        formattedTime = d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + 
                        ' @ ' + 
                        d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    // ------------------------------------

    const priority = String(task.priority || 'normal').toLowerCase();
    const colorClass = priority === 'high' ? 'pink' : (priority === 'medium' ? 'gold' : 'teal');

    item.innerHTML = `
        <div class="time">${formattedTime}</div> 
        <div class="task-main ${colorClass}">
            <div class="task-title">${task.title}</div>
            <div class="task-sub">${task.description || ''}</div>
            <div class="meta-row">
                <span class="confidence-pill">Match: ${(task.confidence > 1 ? task.confidence : (task.confidence || 0) * 100).toFixed(0)}%</span>
            </div>
        </div>
    `;
    container.appendChild(item);
});
}

//this function is the main driver for changing views between agenda, my tasks, and calendar. It fetches the appropriate data and calls the rendering functions.
async function loadView(view) {
  
    const agendaList = document.getElementById('agendaList');
    const titleHeader = document.querySelector('h2'); // The "Today's Agenda" text
    
    if (view === 'agenda') {
        titleHeader.textContent = "Today's Agenda";
        const response = await fetch('http://127.0.0.1:8000/tasks?today=true');
        const tasks = await response.json();

        // STRICT FRONTEND FILTER: Ensure task date matches today's date
        const todayStr = new Date().toISOString().split('T')[0]; // Result: "2026-04-13"
        
        const todaysTasks = tasks.filter(task => {
            const taskDate = task.due || task.due_date;
            if (!taskDate || taskDate === 'None') return false;
            return taskDate.startsWith(todayStr);
        });

        renderTaskList(todaysTasks, 'agendaList');
    }
    else if (view === 'my tasks') {
        titleHeader.textContent = "All My Tasks";
        // Fetch ALL tasks from the DB without the 'today' filter
        const response = await fetch('http://127.0.0.1:8000/tasks');
        const tasks = await response.json();
        renderTaskList(tasks, 'agendaList');
    }
    else if (view === 'calendar') {
    titleHeader.textContent = "Monthly Schedule";
    renderBigCalendar(currentCalMonth, currentCalYear);
}
}

async function renderBigCalendar(month, year) {
    const container = document.getElementById('agendaList');
    
    // 1. Fetch data from backend
    const response = await fetch('http://127.0.0.1:8000/tasks');
    const allTasks = await response.json();

    const monthNames = ["January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"];

    // 2. Create Navigation Header
    container.innerHTML = `
        <div class="cal-nav">
            <button class="ghost" onclick="changeMonth(-1)">◀ Prev</button>
            <h2 style="margin:0">${monthNames[month]} ${year}</h2>
            <button class="ghost" onclick="changeMonth(1)">Next ▶</button>
        </div>
        <div class="big-calendar-grid" id="bigCalGrid"></div>
    `;

    const grid = document.getElementById('bigCalGrid');
    
    // 3. Add Day Headers
    ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(day => {
        const d = document.createElement('div');
        d.className = 'cal-header';
        d.textContent = day;
        grid.appendChild(d);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

    // 4. Draw Days and Insert Tasks
    for (let day = 1; day <= daysInMonth; day++) {
        const daySquare = document.createElement('div');
        daySquare.className = 'cal-day';
        
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        daySquare.dataset.date = dateStr; 
        daySquare.innerHTML = `<span class="day-num">${day}</span>`;

        // --- DROP ZONE LOGIC ---
        daySquare.addEventListener('dragover', (e) => {
            e.preventDefault(); 
            daySquare.style.backgroundColor = '#f0f9ff';
        });

        daySquare.addEventListener('dragleave', () => {
            daySquare.style.backgroundColor = 'white';
        });

        daySquare.addEventListener('drop', async (e) => {
            e.preventDefault();
            daySquare.style.backgroundColor = 'white';
            
            const taskId = e.dataTransfer.getData('text/plain');
            const targetDate = daySquare.dataset.date;
            
            // Safety check: Don't send request if ID is invalid
            if (!taskId || taskId === "undefined") {
                console.error("Drop failed: No valid Task ID found.");
                return;
            }
            
            await updateTaskDate(taskId, targetDate);
            renderBigCalendar(currentCalMonth, currentCalYear);
        });

        // Filter tasks for this day
        const dayTasks = allTasks.filter(t => (t.due || t.due_date || '').startsWith(dateStr));

        dayTasks.forEach(t => {
            const tEl = document.createElement('div');
            tEl.className = `cal-task-pill ${String(t.priority).toLowerCase()}`;
            tEl.textContent = t.title;
            
            // --- DRAGGABLE LOGIC ---
            tEl.draggable = true;
            tEl.addEventListener('dragstart', (e) => {
                // Check multiple ID formats just in case
                const idToStore = t.id || t.task_id; 
                
                if (idToStore === undefined) {
                    console.error("DRAG START ERROR: Task is missing ID field", t);
                }

                e.dataTransfer.setData('text/plain', idToStore);
                tEl.style.opacity = '0.4';
            });

            tEl.addEventListener('dragend', () => {
                tEl.style.opacity = '1';
            });

            daySquare.appendChild(tEl);
        });

        grid.appendChild(daySquare);
    }
}

// Navigation Helper
window.changeMonth = (dir) => {
    currentCalMonth += dir;
    if (currentCalMonth < 0) { currentCalMonth = 11; currentCalYear--; }
    if (currentCalMonth > 11) { currentCalMonth = 0; currentCalYear++; }
    renderBigCalendar(currentCalMonth, currentCalYear);
};

function capitalizePriority(priority) {
  if (!priority) return 'Normal';
  const p = String(priority).toLowerCase().trim();
  return p.charAt(0).toUpperCase() + p.slice(1);
}

async function updateTaskDate(id, newDate) {
    await fetch(`http://127.0.0.1:8000/tasks/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ due_date: newDate }) // Ensure backend expects 'due_date'
    });
}

function buildCalendar() {
    const grid = document.getElementById('calendarGrid');
    if (!grid) return; // Prevent crash if grid is missing

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    // Clear previous calendar
    grid.innerHTML = '';

    // Add Day Names
    const days = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
    days.forEach(d => {
        const el = document.createElement('div');
        el.className = 'dayname';
        el.textContent = d;
        grid.appendChild(el);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    // Add empty slots for previous month
    for (let i = 0; i < firstDay; i++) {
        grid.appendChild(document.createElement('div'));
    }

    // Add actual days
    for (let day = 1; day <= daysInMonth; day++) {
        const el = document.createElement('div');
        el.textContent = day;
        if (day === now.getDate()) el.className = 'selected';
        grid.appendChild(el);
    }
}

function setLiveDates() {
    const today = new Date();

    // 1. Format for the Main Header (e.g., "Tuesday, March 31, 2026")
    const headerOptions = { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
    };
    const formattedHeader = today.toLocaleDateString('en-US', headerOptions);
    document.getElementById('liveDateHeader').textContent = `Today: ${formattedHeader}`;

    //Format for Sidebar (e.g., "March 2026")
    const sidebarOptions = { month: 'long', year: 'numeric' };
    const formattedSidebar = today.toLocaleDateString('en-US', sidebarOptions);
    document.getElementById('sidebarMonthYear').textContent = formattedSidebar;

    //Highlights the current day in the calendar grid
    const currentDay = today.getDate();
    const calendarDays = document.querySelectorAll('.calendar-grid div:not(.dayname)');
    
    calendarDays.forEach(dayDiv => {
        dayDiv.classList.remove('selected');
        // Match the number and add the teal circle
        if (dayDiv.textContent == currentDay) {
            dayDiv.classList.add('selected');
        }
    });
}

// Run the function as soon as the page loads
window.addEventListener('DOMContentLoaded', () => {
    setLiveDates();
    buildCalendar();
});

// Checks for a date change every minute
setInterval(setLiveDates, 60000);

// --- VOICE RECOGNITION (KEEP THIS) ---
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let listening = false;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.onstart = () => { listening = true; voiceBtn.textContent = 'Listening...'; };
  recognition.onresult = (event) => { taskInput.value = event.results[0][0].transcript; };
  recognition.onend = () => { listening = false; voiceBtn.textContent = '🎤 Voice'; };
  voiceBtn.addEventListener('click', () => listening ? recognition.stop() : recognition.start());
}


// runs the AI extraction 
processBtn.addEventListener('click', async () => {
  const text = taskInput.value.trim();
  if (!text) return;

  processBtn.disabled = true;
  processBtn.textContent = "Processing...";

  try {
    const response = await fetch('http://127.0.0.1:8000/ingest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
          content: text,
          source_type: "web", 
          source_id: "clerk_interface" 
      })
    });

    // If the server doesn't send back a 200 OK, throw error
    if (!response.ok) throw new Error("Server error");

    const result = await response.json();
    
    // Success! Show the data and hide the error alert
    renderOutput(result); 
    
  } catch (err) {
    console.error("The exact error is:", err);
    // Only alert if the server is actually dead
    if (err.message.includes('fetch')) {
        alert("Make sure your FastAPI server is running!");
    } else {
        alert("UI Error: " + err.message); 
    }
  } finally {
    processBtn.disabled = false;
    processBtn.textContent = "Add Task";
  }
});
