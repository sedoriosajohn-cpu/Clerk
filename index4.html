<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clerk</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 font-sans">
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

// ---------------- NAVBAR ----------------
function Navbar({user,setUser,setPage}){
return(
<nav className="bg-black text-white p-4 flex gap-4">
<button onClick={()=>setPage('home')}>Home</button>
{!user && <button onClick={()=>setPage('signin')}>Sign In</button>}
{!user && <button onClick={()=>setPage('signup')}>Sign Up</button>}
{user && <button onClick={()=>setPage('dashboard')}>Dashboard</button>}
{user && <button onClick={()=>setPage('input')}>Add Task</button>}
{user && <button onClick={()=>setPage('queue')}>Approval Queue</button>}
{user && <button onClick={()=>setPage('calendar')}>Calendar</button>}
{user && <button onClick={()=>setPage('audio')}>Audio</button>}
{user && <button onClick={()=>setPage('email')}>Email</button>}
{user && <button onClick={()=>setPage('history')}>History</button>}
{user && <button onClick={()=>setPage('settings')}>Settings</button>}
{user && <button className="ml-auto" onClick={()=>setUser(null)}>Logout</button>}
</nav>
)
}

// ---------------- HOME ----------------
function Home(){
return(
<div className="p-10">
<h1 className="text-3xl font-bold">Clerk</h1>
<p className="mt-2 text-gray-600">AI Assisted Task Organization</p>
</div>
)
}

// ---------------- AUTH ----------------
function SignIn({setUser,setPage}){
const[email,setEmail]=React.useState("")

function login(e){
 e.preventDefault()
 setUser({email})
 setPage('dashboard')
}

return(
<div className="p-10 max-w-md mx-auto">
<h2 className="text-2xl font-bold mb-4">Sign In</h2>
<form onSubmit={login} className="flex flex-col gap-3">
<input className="border p-2" placeholder="Email" onChange={e=>setEmail(e.target.value)}/>
<input className="border p-2" placeholder="Password" type="password"/>
<button className="bg-black text-white p-2">Login</button>
</form>
</div>
)
}

function SignUp({setUser,setPage}){
const[email,setEmail]=React.useState("")

function signup(e){
 e.preventDefault()
 setUser({email})
 setPage('dashboard')
}

return(
<div className="p-10 max-w-md mx-auto">
<h2 className="text-2xl font-bold mb-4">Create Account</h2>
<form onSubmit={signup} className="flex flex-col gap-3">
<input className="border p-2" placeholder="Email" onChange={e=>setEmail(e.target.value)}/>
<input className="border p-2" placeholder="Password" type="password"/>
<button className="bg-black text-white p-2">Sign Up</button>
</form>
</div>
)
}

// ---------------- DASHBOARD ----------------
function Dashboard({tasks,setPage}){
return(
<div className="p-10">
<h1 className="text-3xl font-bold mb-4">Dashboard</h1>

{tasks.map(t=> (
<div key={t.id} className="border p-3 mb-2 flex justify-between">
<div>
<p className="font-semibold">{t.title}</p>
<div className="w-40 bg-gray-200 h-2 mt-1">
<div className="bg-green-500 h-2" style={{width:(t.confidence*100)+'%'}}></div>
</div>
<p className="text-sm">Confidence {Math.round(t.confidence*100)}%</p>
</div>

<button onClick={()=>setPage('task-'+t.id)} className="bg-blue-200 px-2">Open</button>
</div>
))}
</div>
)
}

// ---------------- TASK DETAIL ----------------
function TaskDetail({task,setPage}){
return(
<div className="p-10 max-w-md mx-auto">
<h2 className="text-2xl font-bold">{task.title}</h2>
<p className="mt-2">Deadline: {task.deadline}</p>
<p className="mt-2">Confidence {Math.round(task.confidence*100)}%</p>

<div className="flex gap-2 mt-4">
<button className="bg-green-200 px-3 py-1" onClick={()=>setPage('dashboard')}>Approve</button>
<button className="bg-red-200 px-3 py-1" onClick={()=>setPage('dashboard')}>Delete</button>
</div>
</div>
)
}

// ---------------- TEXT INPUT ----------------
function TextInput({setTasks,tasks}){
const[text,setText]=React.useState("")

function process(){
 if(!text)return

 const newTask={
 id:Date.now(),
 title:text,
 deadline:"Not Parsed",
 confidence:0.8
 }

 setTasks([...tasks,newTask])
 setText("")
}

return(
<div className="p-10 max-w-lg mx-auto">
<h2 className="text-2xl font-bold mb-4">Enter Task</h2>
<textarea className="border w-full p-2" rows="4" value={text} onChange={e=>setText(e.target.value)} placeholder="Example: Finish report by Friday"></textarea>

<button className="bg-black text-white px-4 py-2 mt-3" onClick={process}>Submit</button>

</div>
)
}

// ---------------- APPROVAL QUEUE ----------------
function ApprovalQueue({tasks}){
return(

<div className="p-10">
<h2 className="text-2xl font-bold mb-4">AI Suggested Tasks</h2>

{tasks.map(t=> (

<div key={t.id} className="border p-2 mb-2 flex justify-between">
<span>{t.title}</span>
<span>{Math.round(t.confidence*100)}%</span>
</div>
))}
</div>
)
}

// ---------------- CALENDAR ----------------
function CalendarView({tasks}){
return(

<div className="p-10">
<h2 className="text-2xl font-bold mb-4">Schedule</h2>

<div className="grid grid-cols-2 gap-4">

<div className="border p-3">
<h3 className="font-bold">Monday</h3>
{tasks.slice(0,2).map(t=><p key={t.id}>{t.title}</p>)}
</div>

<div className="border p-3">
<h3 className="font-bold">Tuesday</h3>
{tasks.slice(2).map(t=><p key={t.id}>{t.title}</p>)}
</div>

</div>
</div>
)
}

// ---------------- AUDIO ----------------
function AudioPage(){
return(

<div className="p-10">
<h2 className="text-2xl font-bold mb-4">Audio Recording</h2>
<p>MediaRecorder placeholder</p>

<div className="flex gap-2 mt-4">
<button className="bg-gray-200 px-3">Record</button>
<button className="bg-gray-200 px-3">Stop</button>
<button className="bg-gray-200 px-3">Play</button>
</div>
</div>
)
}

// ---------------- EMAIL ----------------
function EmailPage(){
return(

<div className="p-10">
<h2 className="text-2xl font-bold mb-4">Imported Emails</h2>

<ul className="list-disc ml-5">
<li>Meeting Monday → Prepare slides</li>
<li>Homework reminder → Submit assignment</li>
<li>Project update → Review proposal</li>
</ul>
</div>
)
}

// ---------------- HISTORY ----------------
function History(){
return(

<div className="p-10">
<h2 className="text-2xl font-bold">Input History</h2>

<ul className="list-disc ml-5 mt-2">
<li>Audio Note → 2 tasks extracted</li>
<li>Email Import → 3 tasks extracted</li>
<li>Manual Text Entry → 1 task</li>
</ul>
</div>
)
}

// ---------------- SETTINGS ----------------
function Settings(){
return(

<div className="p-10 max-w-md mx-auto">
<h2 className="text-2xl font-bold mb-4">User Settings</h2>

<label className="block mt-2">Preferred Work Hours</label> <input className="border p-2 w-full" placeholder="9am - 5pm"/>

<label className="block mt-4">Timezone</label> <input className="border p-2 w-full" placeholder="EST"/>

<label className="block mt-4">Reminder Frequency</label> <select className="border p-2 w-full">

<option>Daily</option>
<option>Weekly</option>
</select>
</div>
)
}

// ---------------- APP ----------------
function App(){

const[user,setUser]=React.useState(null)
const[page,setPage]=React.useState('home')

const[tasks,setTasks]=React.useState([
{id:1,title:'Finish project report',deadline:'Friday',confidence:0.9},
{id:2,title:'Email professor',deadline:'Tomorrow',confidence:0.8},
{id:3,title:'Prepare slides',deadline:'Monday',confidence:0.75}
])

let view

if(page==='home')view=<Home/>
else if(page==='signin')view=<SignIn setUser={setUser} setPage={setPage}/>
else if(page==='signup')view=<SignUp setUser={setUser} setPage={setPage}/>
else if(page==='dashboard')view=<Dashboard tasks={tasks} setPage={setPage}/>
else if(page==='input')view=<TextInput tasks={tasks} setTasks={setTasks}/>
else if(page==='queue')view=<ApprovalQueue tasks={tasks}/>
else if(page==='calendar')view=<CalendarView tasks={tasks}/>
else if(page==='audio')view=<AudioPage/>
else if(page==='email')view=<EmailPage/>
else if(page==='history')view=<History/>
else if(page==='settings')view=<Settings/>
else if(page.startsWith('task-')){
const id=page.split('-')[1]
const task=tasks.find(t=>t.id==id)
view=<TaskDetail task={task} setPage={setPage}/>
}

return(

<div>
<Navbar user={user} setUser={setUser} setPage={setPage}/>
{view}
</div>
)
}

const root=ReactDOM.createRoot(document.getElementById('root'))
root.render(<App/>)

</script>
</body>
</html>
